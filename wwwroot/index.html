<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        button {
            background-color: #3498db;
            color: #fff;
            padding: 10px 20px;
            border: none;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 5px 0 0 #276873;
            transition: background-color 0.3s ease;
        }
        button:hover{
            background-color: #4CA1D9;
        }
    </style>
</head>
<body>
<button>Мэйк бьютифул</button>
</body>
</html>
